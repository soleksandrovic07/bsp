<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Прогноз продаж — Май 2026</title>
<script>
  // Embedded state — replaced on download with actual data
  window.__EMBEDDED_STATE__ = null;
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1917;
    --text2: #6b6965;
    --text3: #9e9b96;
    --blue: #378ADD;
    --teal: #1D9E75;
    --amber: #BA7517;
    --red: #A32D2D;
    --green: #3B6D11;
    --radius: 10px;
    --radius-lg: 14px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #18181a;
      --surface: #232325;
      --surface2: #2c2c2e;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.15);
      --text: #f0ede8;
      --text2: #9e9b96;
      --text3: #6b6965;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container { max-width: 960px; margin: 0 auto; }

  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .title-block h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .title-block p {
    font-size: 13px;
    color: var(--text2);
    margin-top: 3px;
  }

  .header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  button {
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    border-radius: var(--radius);
    padding: 7px 14px;
    transition: all 0.15s;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text);
  }
  button:hover { background: var(--surface2); }
  button:active { transform: scale(0.97); }
  button.primary {
    background: var(--text);
    color: var(--bg);
    border-color: transparent;
  }
  button.primary:hover { opacity: 0.88; }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin: 2rem 0 0.75rem;
  }

  /* KPI cards */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
  }
  .kpi {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.1rem;
  }
  .kpi .k-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .kpi .k-val { font-size: 21px; font-weight: 600; letter-spacing: -0.02em; }
  .kpi .k-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .kpi.danger .k-val { color: var(--red); }
  .kpi.success .k-val { color: var(--green); }

  /* Manager cards */
  .mgr-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 12px; }
  .mgr-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.1rem 1.2rem;
  }
  .mgr-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .mgr-name { font-size: 15px; font-weight: 600; }
  .mgr-pct {
    font-size: 12px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 99px;
    background: var(--surface2);
    color: var(--text2);
  }

  .mgr-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text2);
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
  }
  .mgr-row:last-of-type { border-bottom: none; }
  .mgr-row .v { font-weight: 500; color: var(--text); }
  .mgr-row .v.red { color: var(--red); }
  .mgr-row .v.green { color: var(--green); }

  .bar-wrap { margin-top: 10px; }
  .bar-bg {
    background: var(--surface2);
    border-radius: 99px;
    height: 5px;
    overflow: hidden;
    margin-top: 4px;
  }
  .bar-fill { height: 100%; border-radius: 99px; transition: width 0.5s ease; }

  /* Chart wrapper */
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.2rem 1.4rem;
    margin-top: 0;
  }
  .chart-title { font-size: 13px; font-weight: 500; margin-bottom: 10px; color: var(--text2); }
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 10px;
  }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .ldot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  /* EDITOR PANEL */
  .editor-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    display: none;
  }
  .editor-panel.open { display: block; }

  .editor-top {
    padding: 1rem 1.2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }
  .editor-top h3 { font-size: 14px; font-weight: 600; }

  .editor-body { padding: 1.2rem; }

  .editor-tabs { display: flex; gap: 4px; margin-bottom: 1rem; flex-wrap: wrap; }
  .etab {
    font-size: 12px;
    padding: 5px 12px;
    border-radius: var(--radius);
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
  }
  .etab.active { background: var(--text); color: var(--bg); border-color: transparent; }

  .mgr-editor { display: none; }
  .mgr-editor.active { display: block; }

  .plan-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1rem;
  }
  .plan-row label { font-size: 12px; color: var(--text2); width: 100px; flex-shrink: 0; }
  .plan-row input[type=number] {
    flex: 1;
    font-family: inherit;
    font-size: 13px;
    padding: 7px 10px;
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    background: var(--surface2);
    color: var(--text);
    width: 100%;
  }
  .plan-row input[type=number]:focus { outline: 2px solid var(--blue); outline-offset: 1px; }

  table.day-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  table.day-table th {
    text-align: left;
    padding: 6px 8px;
    color: var(--text3);
    font-weight: 500;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
  }
  table.day-table td { padding: 4px 4px; border-bottom: 1px solid var(--border); }
  table.day-table tr:last-child td { border-bottom: none; }
  table.day-table td.day-num { color: var(--text2); font-size: 11px; padding-left: 8px; width: 60px; }
  table.day-table input[type=number] {
    width: 100%;
    font-family: inherit;
    font-size: 12px;
    padding: 5px 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface2);
    color: var(--text);
  }
  table.day-table input[type=number]:focus { outline: 2px solid var(--blue); }

  .editor-actions { display: flex; gap: 8px; margin-top: 1rem; }

  @media (max-width: 600px) {
    .kpi .k-val { font-size: 17px; }
    header { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="title-block">
      <h1>Прогноз продаж — Май 2026</h1>
      <p id="updated-label">Данные за май 2026 · обновлено сейчас</p>
    </div>
    <div class="header-actions">
      <button onclick="toggleEditor()">✏️ Редактировать данные</button>
      <button class="primary" onclick="downloadHTML()">⬇ Скачать</button>
    </div>
  </header>

  <!-- EDITOR -->
  <div class="editor-panel" id="editorPanel">
    <div class="editor-top">
      <h3>Редактирование данных</h3>
      <div style="display:flex;gap:8px;">
        <button onclick="applyAndClose()" class="primary">✓ Применить</button>
        <button onclick="toggleEditor()">Закрыть</button>
      </div>
    </div>
    <div class="editor-body">
      <div style="font-size:12px;color:var(--text2);background:var(--surface2);padding:8px 12px;border-radius:var(--radius);margin-bottom:1rem;">
        💡 После применения нажми <strong>⬇ Скачать</strong> — только скачанный файл сохранит изменения при загрузке на GitHub.
      </div>
      <div class="plan-row">
        <label>Общий план ₴</label>
        <input type="number" id="inp-total-plan" value="1650000" step="1000">
      </div>
      <div class="editor-tabs" id="mgrTabs"></div>
      <div id="mgrEditors"></div>
    </div>
  </div>

  <!-- KPI -->
  <p class="section-label">Сводка</p>
  <div class="kpi-grid" id="kpiGrid"></div>

  <!-- MANAGER CARDS -->
  <p class="section-label">По менеджерам</p>
  <div class="mgr-grid" id="mgrGrid"></div>

  <!-- CHARTS -->
  <p class="section-label">Факт vs план</p>
  <div class="chart-card">
    <div class="legend" id="legend1"></div>
    <div style="position:relative;width:100%;height:260px;">
      <canvas id="barChart" role="img" aria-label="Факт и план по менеджерам"></canvas>
    </div>
  </div>

  <p class="section-label">Накопленные оплаты по дням</p>
  <div class="chart-card">
    <div class="legend" id="legend2"></div>
    <div style="position:relative;width:100%;height:260px;">
      <canvas id="lineChart" role="img" aria-label="Кумулятивные оплаты по дням мая"></canvas>
    </div>
  </div>

  <p class="section-label">Выполнение плана (%)</p>
  <div class="chart-card" style="display:flex;align-items:center;gap:2rem;flex-wrap:wrap;">
    <div style="position:relative;width:200px;height:200px;flex-shrink:0;margin:0 auto;">
      <canvas id="donutChart" role="img" aria-label="Доля выполнения плана по менеджерам"></canvas>
    </div>
    <div id="donutLegend" style="flex:1;min-width:180px;display:flex;flex-direction:column;gap:10px;"></div>
  </div>

</div>

<script>
// =================== STATE ===================
const DAYS_IN_MAY = 31;
const MONTHS = ['мая'];

let state = {
  totalPlan: 1650000,
  managers: [
    {
      name: 'Неля',
      plan: 575000,
      color: '#378ADD',
      days: Array(DAYS_IN_MAY).fill(0).map((_, i) => {
        const vals = {3:19560, 4:5150, 5:17370, 7:4200};
        return vals[i] || 0;
      })
    },
    {
      name: 'Наталья',
      plan: 575000,
      color: '#1D9E75',
      days: Array(DAYS_IN_MAY).fill(0).map((_, i) => {
        const vals = {3:4650, 5:47900, 6:18300, 7:30250};
        return vals[i] || 0;
      })
    },
    {
      name: 'Наталья З',
      plan: 575000,
      color: '#BA7517',
      days: Array(DAYS_IN_MAY).fill(0).map((_, i) => {
        const vals = {3:16000, 4:15663, 5:68727, 6:18434.7, 7:17850};
        return vals[i] || 0;
      })
    }
  ]
};

let barChart, lineChart, donutChart;

// =================== FORMAT ===================
const fmt = v => Math.round(v).toLocaleString('ru-RU');
const fmtK = v => v >= 1000000 ? (v/1000000).toFixed(1)+'M' : v >= 1000 ? (v/1000).toFixed(0)+'k' : Math.round(v);
const pct = (a, b) => b ? ((a / b) * 100).toFixed(1) + '%' : '0%';

// =================== CUMULATIVE ===================
function cumulative(arr) {
  let s = 0;
  return arr.map(v => (s += v, s));
}

// =================== RENDER KPI ===================
function renderKPI() {
  const totalFact = state.managers.reduce((s, m) => s + m.days.reduce((a, b) => a + b, 0), 0);
  const totalPlan = state.totalPlan;
  const deviation = totalFact - totalPlan;
  const pctDone = (totalFact / totalPlan * 100).toFixed(1);

  // Simple linear prognosis: project per-day avg to full month
  const today = 11;
  const dailyAvg = totalFact / today;
  const prognosis = dailyAvg * DAYS_IN_MAY;
  const progDeviation = prognosis - totalPlan;

  document.getElementById('kpiGrid').innerHTML = `
    <div class="kpi"><div class="k-label">Общий план</div><div class="k-val">${fmt(totalPlan)}</div><div class="k-sub">₴ на месяц</div></div>
    <div class="kpi ${totalFact > 0 ? 'success' : ''}"><div class="k-label">Факт (всего)</div><div class="k-val">${fmt(totalFact)}</div><div class="k-sub">₴ внесено</div></div>
    <div class="kpi"><div class="k-label">Выполнение</div><div class="k-val">${pctDone}%</div><div class="k-sub">от общего плана</div></div>
    <div class="kpi danger"><div class="k-label">Отклонение</div><div class="k-val">${deviation < 0 ? '−' : '+'}${fmt(Math.abs(deviation))}</div><div class="k-sub">₴ факт vs план</div></div>
    <div class="kpi ${progDeviation >= 0 ? 'success' : 'danger'}"><div class="k-label">Прогноз к концу</div><div class="k-val">${progDeviation < 0 ? '−' : '+'}${fmt(Math.abs(progDeviation))}</div><div class="k-sub">₴ при текущем темпе</div></div>
  `;
}

// =================== RENDER MANAGER CARDS ===================
function renderMgrCards() {
  document.getElementById('mgrGrid').innerHTML = state.managers.map(m => {
    const fact = m.days.reduce((a, b) => a + b, 0);
    const remain = m.plan - fact;
    const p = (fact / m.plan * 100).toFixed(1);
    return `
      <div class="mgr-card">
        <div class="mgr-header">
          <div class="mgr-name">${m.name}</div>
          <div class="mgr-pct" style="color:${m.color}">${p}%</div>
        </div>
        <div class="mgr-row">Факт <span class="v">${fmt(fact)} ₴</span></div>
        <div class="mgr-row">План <span class="v">${fmt(m.plan)} ₴</span></div>
        <div class="mgr-row">До плана <span class="v ${remain > 0 ? 'red' : 'green'}">${remain > 0 ? '−' : '+'}${fmt(Math.abs(remain))} ₴</span></div>
        <div class="bar-wrap">
          <div class="bar-bg"><div class="bar-fill" style="width:${Math.min(p, 100)}%;background:${m.color}"></div></div>
        </div>
      </div>
    `;
  }).join('');
}

// =================== RENDER CHARTS ===================
function renderCharts() {
  const labels = state.managers.map(m => m.name);
  const facts = state.managers.map(m => m.days.reduce((a, b) => a + b, 0));
  const plans = state.managers.map(m => m.plan);
  const colors = state.managers.map(m => m.color);

  // Legend 1
  document.getElementById('legend1').innerHTML =
    state.managers.map(m => `<span><span class="ldot" style="background:${m.color}"></span>${m.name}</span>`).join('') +
    `<span><span class="ldot" style="background:rgba(136,135,128,0.3);border:1px dashed #888"></span>План</span>`;

  // Bar chart
  if (barChart) barChart.destroy();
  barChart = new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: 'Факт',
          data: facts,
          backgroundColor: colors,
          borderRadius: 5,
          borderSkipped: false
        },
        {
          label: 'План',
          data: plans,
          backgroundColor: 'rgba(136,135,128,0.18)',
          borderColor: '#888',
          borderWidth: 1,
          borderRadius: 5,
          borderSkipped: false
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ' ' + ctx.dataset.label + ': ' + fmt(ctx.parsed.y) + ' ₴' } }
      },
      scales: {
        x: { grid: { display: false }, ticks: { color: '#888', font: { size: 12 } } },
        y: { grid: { color: 'rgba(136,135,128,0.12)' }, ticks: { color: '#888', font: { size: 11 }, callback: fmtK } }
      }
    }
  });

  // Line chart (cumulative, show only days with data)
  const dayLabels = Array.from({ length: DAYS_IN_MAY }, (_, i) => `${i + 1}`);
  document.getElementById('legend2').innerHTML =
    state.managers.map(m => `<span><span class="ldot" style="background:${m.color}"></span>${m.name}</span>`).join('');

  if (lineChart) lineChart.destroy();
  lineChart = new Chart(document.getElementById('lineChart'), {
    type: 'line',
    data: {
      labels: dayLabels,
      datasets: state.managers.map(m => ({
        label: m.name,
        data: cumulative(m.days),
        borderColor: m.color,
        backgroundColor: m.color + '22',
        borderWidth: 2, fill: true, tension: 0.35,
        pointRadius: m.days.map(v => v > 0 ? 3 : 0),
        pointBackgroundColor: m.color
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ' ' + ctx.dataset.label + ': ' + fmt(ctx.parsed.y) + ' ₴' } }
      },
      scales: {
        x: { grid: { display: false }, ticks: { color: '#888', font: { size: 11 }, maxTicksLimit: 15 } },
        y: { grid: { color: 'rgba(136,135,128,0.12)' }, ticks: { color: '#888', font: { size: 11 }, callback: fmtK } }
      }
    }
  });

  // Donut
  const pcts = state.managers.map(m => {
    const f = m.days.reduce((a, b) => a + b, 0);
    return parseFloat((f / m.plan * 100).toFixed(1));
  });

  if (donutChart) donutChart.destroy();
  donutChart = new Chart(document.getElementById('donutChart'), {
    type: 'doughnut',
    data: {
      labels: state.managers.map(m => m.name),
      datasets: [{
        data: pcts,
        backgroundColor: colors,
        borderWidth: 0,
        hoverOffset: 6
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '65%',
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ' ' + ctx.label + ': ' + ctx.parsed.toFixed(1) + '% от плана' } }
      }
    }
  });

  document.getElementById('donutLegend').innerHTML = state.managers.map((m, i) => {
    const fact = m.days.reduce((a, b) => a + b, 0);
    return `
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="width:12px;height:12px;border-radius:3px;background:${m.color};flex-shrink:0"></span>
        <div>
          <div style="font-size:13px;font-weight:500">${m.name}</div>
          <div style="font-size:11px;color:var(--text2)">${fmt(fact)} ₴ из ${fmt(m.plan)} ₴ — ${pcts[i]}%</div>
        </div>
      </div>
    `;
  }).join('');
}

// =================== FULL RENDER ===================
function renderAll() {
  renderKPI();
  renderMgrCards();
  renderCharts();
  const now = new Date().toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
  document.getElementById('updated-label').textContent = `Данные за май 2026 · обновлено ${now}`;
}

// =================== EDITOR ===================
function buildEditor() {
  const tabsEl = document.getElementById('mgrTabs');
  const editorsEl = document.getElementById('mgrEditors');
  document.getElementById('inp-total-plan').value = state.totalPlan;

  tabsEl.innerHTML = state.managers.map((m, i) =>
    `<button class="etab ${i === 0 ? 'active' : ''}" onclick="switchMgrTab(${i})">${m.name}</button>`
  ).join('');

  editorsEl.innerHTML = state.managers.map((m, i) => `
    <div class="mgr-editor ${i === 0 ? 'active' : ''}" id="mgr-editor-${i}">
      <div class="plan-row">
        <label>План ₴</label>
        <input type="number" id="plan-${i}" value="${m.plan}" step="1000">
      </div>
      <table class="day-table">
        <thead><tr><th>День мая</th><th>Оплата ₴</th></tr></thead>
        <tbody>
          ${Array.from({ length: DAYS_IN_MAY }, (_, d) => `
            <tr>
              <td class="day-num">${d + 1} мая</td>
              <td><input type="number" id="day-${i}-${d}" value="${m.days[d] || ''}" min="0" step="100" placeholder="0"></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `).join('');
}

function switchMgrTab(idx) {
  document.querySelectorAll('.etab').forEach((t, i) => t.classList.toggle('active', i === idx));
  document.querySelectorAll('.mgr-editor').forEach((e, i) => e.classList.toggle('active', i === idx));
}

function toggleEditor() {
  const panel = document.getElementById('editorPanel');
  const isOpen = panel.classList.toggle('open');
  if (isOpen) {
    buildEditor();
    panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function applyAndClose() {
  state.totalPlan = parseFloat(document.getElementById('inp-total-plan').value) || state.totalPlan;
  state.managers.forEach((m, i) => {
    m.plan = parseFloat(document.getElementById(`plan-${i}`).value) || m.plan;
    m.days = Array.from({ length: DAYS_IN_MAY }, (_, d) => {
      const v = parseFloat(document.getElementById(`day-${i}-${d}`).value);
      return isNaN(v) ? 0 : v;
    });
  });
  document.getElementById('editorPanel').classList.remove('open');
  saveState();
  renderAll();
}

// =================== PERSIST ===================
const LS_KEY = 'dashboard_may2026_state';

function saveState() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch(e) {}
}

function loadState() {
  // Priority 1: embedded state (from a previously downloaded file)
  if (window.__EMBEDDED_STATE__) {
    state = window.__EMBEDDED_STATE__;
    return;
  }
  // Priority 2: localStorage (works when opening same file locally)
  try {
    const saved = localStorage.getItem(LS_KEY);
    if (saved) { state = JSON.parse(saved); }
  } catch(e) {}
}

// =================== DOWNLOAD ===================
function downloadHTML() {
  const src = document.documentElement.outerHTML;
  const stateJSON = JSON.stringify(state);

  // Replace sentinel (null) OR previously embedded value
  let out = src.replace(
    /window\.__EMBEDDED_STATE__\s*=\s*(?:null|\{[\s\S]*?\});/,
    `window.__EMBEDDED_STATE__ = ${stateJSON};`
  );

  const blob = new Blob([out], { type: 'text/html;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'dashboard_may2026.html';
  a.click();
  URL.revokeObjectURL(a.href);
}

// =================== INIT ===================
loadState();
renderAll();
</script>
